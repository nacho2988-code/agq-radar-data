name: Obtener empresas licitadoras de un expediente

on:
  workflow_dispatch:
    inputs:
      expediente:
        description: 'Expediente del contrato adjudicado (ej: 167/EI275)'
        required: true

jobs:
  obtener-licitadoras:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: Buscar acta de adjudicación y extraer licitadoras
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/obtener-licitadoras.mjs "${{ github.event.inputs.expediente }}"

      - name: Guardar resultados
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/historico_adjudicaciones.json
          git diff --staged --quiet || git commit -m "Licitadoras: ${{ github.event.inputs.expediente }}"
          git push
