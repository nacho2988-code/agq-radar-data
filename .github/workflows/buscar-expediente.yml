name: Buscar y dar de alta un expediente concreto

on:
  workflow_dispatch:
    inputs:
      expediente:
        description: 'Expediente o texto a buscar (ej: 31055010149261 o "gas radón")'
        required: true

jobs:
  buscar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: Buscar expediente en el feed completo de PLACSP
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/buscar-expediente.mjs "${{ github.event.inputs.expediente }}"

      - name: Commitear el snapshot y resumen si se encontró
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/licitaciones.json data/resumenes/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Alta automática: ${{ github.event.inputs.expediente }}"
          git push
