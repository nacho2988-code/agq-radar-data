name: Backfill histórico de adjudicaciones (2021-hoy)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar backfill histórico
        env:
          APISPAIN_KEY: ${{ secrets.APISPAIN_KEY }}
        run: node scripts/backfill-historico.mjs 2>&1 | tee /tmp/backfill-output.log; true

      - name: Mostrar log siempre
        if: always()
        run: cat /tmp/backfill-output.log || echo "(sin log)"

      - name: Commitear resultados
        if: always()
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "Backfill diagnóstico $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push || true
