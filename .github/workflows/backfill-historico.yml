name: Backfill histórico de adjudicaciones (2021-hoy)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar backfill histórico
        env:
          APISPAIN_KEY: ${{ secrets.APISPAIN_KEY }}
        run: node scripts/backfill-historico.mjs 2>&1 | tee /tmp/backfill-output.log; EXIT=${PIPESTATUS[0]}; if [ $EXIT -ne 0 ]; then cp /tmp/backfill-output.log data/backfill-debug.txt; fi; exit $EXIT

      - name: Commitear debug si hubo error
        if: failure()
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/backfill-debug.txt || true
          git diff --staged --quiet || git commit -m "Debug backfill error" && git push || true

      - name: Commitear el histórico generado
        if: success()
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/historico_adjudicaciones.json || true
          git diff --staged --quiet || git commit -m "Backfill histórico adjudicaciones $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
