name: Backfill histórico de adjudicaciones (2021-hoy)

on:
  workflow_dispatch:   # Solo manual — es una carga única, no diaria
  # Para re-ejecutar: Actions → "Backfill histórico" → Run workflow

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # Los ZIPs anuales son grandes; 60 min debería ser suficiente

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias (incluida unzipper)
        run: npm install

      - name: Instalar unzipper si no está en package.json
        run: npm install unzipper --save

      - name: Ejecutar backfill histórico
        run: node scripts/backfill-historico.mjs

      - name: Commitear el histórico generado
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/historico_adjudicaciones.json package.json package-lock.json || true
          git diff --staged --quiet || git commit -m "Backfill histórico adjudicaciones $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
