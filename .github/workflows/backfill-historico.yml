name: Backfill histórico de adjudicaciones (2021-hoy)

on:
  workflow_dispatch:   # Solo manual — es una carga única, no diaria
  # Para re-ejecutar: Actions → "Backfill histórico" → Run workflow

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # Los ZIPs anuales son grandes; 60 min debería ser suficiente

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias (incluida unzipper)
        run: npm install

      - name: Instalar unzipper si no está en package.json
        run: npm install unzipper --save

      - name: Verificar acceso a datos históricos de PLACSP
        run: |
          echo "Probando acceso a datos históricos..."
          curl -sI -A "AGQ-Radar-Backfill/1.0" \
            "https://contrataciondelsectorpublico.gob.es/sindicacion/sindicacion_643/licitacionesPerfilesContratanteCompleto3_2021.zip" \
            | head -5
          echo "---"
          curl -sI -A "Mozilla/5.0 (X11; Linux x86_64)" \
            "https://contrataciondelsectorpublico.gob.es/sindicacion/sindicacion_643/licitacionesPerfilesContratanteCompleto3_2021.zip" \
            | head -5

      - name: Ejecutar backfill histórico
        run: node scripts/backfill-historico.mjs 2>&1 | tee /tmp/backfill-output.log; exit ${PIPESTATUS[0]}

      - name: Mostrar últimas líneas del log si hubo error
        if: failure()
        run: tail -50 /tmp/backfill-output.log || echo "Sin log disponible"

      - name: Commitear el histórico generado
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/historico_adjudicaciones.json package.json package-lock.json || true
          git diff --staged --quiet || git commit -m "Backfill histórico adjudicaciones $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
