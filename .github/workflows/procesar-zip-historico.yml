name: Procesar ZIP histórico de PLACSP

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Año (all = todos 2020-2026)'
        required: true
        default: 'all'

jobs:
  procesar:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Enriquecer histórico desde ZIPs PLACSP
        env:
          TARGET_YEAR: ${{ github.event.inputs.year }}
        run: |
          python3 scripts/enriquecer-historico.py

      - name: Guardar
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/historico_adjudicaciones.json
          git diff --staged --quiet || git commit -m "Enriquecer historico desde ZIPs: presupuestoBase, importeAdjudicacion, n_ofertas"
          git push
