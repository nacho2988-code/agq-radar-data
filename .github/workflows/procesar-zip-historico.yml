name: Procesar ZIP histórico de PLACSP

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Año a procesar (all = todos 2020-2026)'
        required: true
        default: 'all'

jobs:
  procesar:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Procesar ZIPs y enriquecer histórico
        env:
          TARGET_YEAR: ${{ github.event.inputs.year }}
        run: python3 scripts/enriquecer-historico.py

      - name: Commit único al finalizar
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/historico_adjudicaciones.json
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && echo "Push OK" && break
            echo "Reintento $i..." && sleep 15
          done
