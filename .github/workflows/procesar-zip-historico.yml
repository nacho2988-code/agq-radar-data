name: Procesar ZIP histórico de PLACSP

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Año del ZIP a procesar (ej: 2023)'
        required: true
        default: '2023'

jobs:
  procesar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: Descargar ZIP de PLACSP
        run: |
          YEAR="${{ github.event.inputs.year }}"
          URL="https://contrataciondelsectorpublico.gob.es/sindicacion/sindicacion_643/licitacionesPerfilesContratanteCompleto3_${YEAR}.zip"
          echo "Descargando $URL..."
          curl -L -A "Mozilla/5.0 (X11; Linux x86_64)" --retry 3 -o /tmp/placsp_${YEAR}.zip "$URL"
          ls -lh /tmp/placsp_${YEAR}.zip

      - name: Procesar ZIP y actualizar histórico
        run: node scripts/procesar-zip-local.mjs /tmp/placsp_${{ github.event.inputs.year }}.zip ${{ github.event.inputs.year }}

      - name: Commitear histórico actualizado
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/historico_adjudicaciones.json
          git diff --staged --quiet || git commit -m "Backfill ${{ github.event.inputs.year }}: histórico actualizado"
          git push
