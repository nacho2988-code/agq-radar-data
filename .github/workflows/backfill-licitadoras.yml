name: Backfill importeAdjudicacion y licitadoras del histórico

on:
  workflow_dispatch:
  schedule:
    # Ejecutar 3 veces al día para cubrir los ~1500 req/día de Gemini
    - cron: '0 6 * * *'   # 6:00 UTC (8:00 España)
    - cron: '0 12 * * *'  # 12:00 UTC (14:00 España)
    - cron: '0 18 * * *'  # 18:00 UTC (20:00 España)

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # máximo productivo sin desperdiciar recursos

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: Enriquecer histórico con importeAdjudicacion y licitadoras
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/backfill-licitadoras.mjs

      - name: Guardar resultados
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/historico_adjudicaciones.json
          git diff --staged --quiet || git commit -m "Backfill licitadoras: importeAdjudicacion + empresas concurrentes"
          git push
