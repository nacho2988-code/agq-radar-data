name: Backfill importeAdjudicacion y licitadoras del histórico

on:
  workflow_dispatch:
    inputs:
      max_gemini:
        description: 'Máx. actas a parsear con Gemini (para no agotar cuota)'
        default: '15'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: Enriquecer histórico con importeAdjudicacion y licitadoras
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAX_GEMINI: ${{ github.event.inputs.max_gemini }}
        run: node scripts/backfill-licitadoras.mjs

      - name: Guardar resultados
        run: |
          git config user.name "agq-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/historico_adjudicaciones.json
          git diff --staged --quiet || git commit -m "Backfill licitadoras: importeAdjudicacion + empresas concurrentes"
          git push
